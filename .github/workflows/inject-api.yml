name: Emergency Restore
on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Baixa todo o histórico para podermos voltar no tempo

      - name: Rollback to Safe State
        run: |
          # Vamos resetar para 5 commits atrás (antes das tentativas de hoje)
          git reset --hard HEAD~8
          git config --global user.name 'Arquiteto Restore'
          git config --global user.email 'restore@github.com'
          # Forçamos o GitHub a aceitar a versão antiga "boa"
          git push origin main --force
