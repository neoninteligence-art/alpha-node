name: Inject API Link
on:
  workflow_dispatch:

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Arquiteto Clean and Inject
        run: |
          python3 -c "
          import os

          banner = '''
          <div style='width:100%; clear:both; display:block; padding:40px 0; text-align:center;'>
            <div style='display:inline-block; background:#f8f9fa; color:#3c4043; padding:20px; border-radius:12px; border:1px solid #dadce0; font-family:sans-serif; max-width:600px; box-shadow:0 4px 10px rgba(0,0,0,0.05); text-align:center;'>
              <p style='margin:0 0 12px 0; font-size:16px; font-weight:bold;'>⚙️ Solução Corporativa</p>
              <p style='margin:0 0 15px 0; font-size:14px; color:#5f6368;'>Integre dados de sistemas legados via API profissional.</p>
              <a href='https://rapidapi.com/techsuportalvorada/api/legacy-data-system-bridge' rel='nofollow' target='_blank' style='display:inline-block; background:#1a73e8; color:#ffffff; padding:10px 20px; border-radius:6px; text-decoration:none; font-size:14px; font-weight:bold;'>Acesse Documentação no RapidAPI</a>
            </div>
          </div>
          '''

          path = 'public'
          for filename in os.listdir(path):
              if filename.endswith('.html'):
                  file_path = os.path.join(path, filename)
                  with open(file_path, 'r', encoding='utf-8') as f:
                      content = f.read()
                  
                  # 1. Limpeza: remove qualquer versão anterior do banner (marcada ou não)
                  import re
                  content = re.sub(r'.*?', '', content, flags=re.DOTALL)
                  content = re.sub(r'<div style=\"background:#f1f3f4;.*?Acesse no RapidAPI</a></div>', '', content)

                  # 2. Injeção: coloca o novo banner antes do fechamento do body
                  if '</body>' in content:
                      new_content = content.replace('</body>', banner + '</body>')
                      with open(file_path, 'w', encoding='utf-8') as f:
                          f.write(new_content)
                      print(f'Sucesso: {filename}')
          "

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Arquiteto'
          git config --global user.email 'action@github.com'
          git add .
          git commit -m "Arquitetura de layout corrigida com Python" || echo "Sem mudanças"
          git push
