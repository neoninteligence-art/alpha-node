name: Inject API Link
on:
  workflow_dispatch: # Isso permite que você aperte um botão para rodar

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Injection Script
        run: |
          for file in public/*.html; do
            if ! grep -q "rapidapi.com/techsuportalvorada" "$file"; then
              sed -i 's|<\/body>|<div style="background:#f1f3f4;color:#3c4043;padding:15px;border-radius:8px;border:1px solid #dadce0;font-family:sans-serif;text-align:center;margin:30px auto;max-width:700px;"><p style="margin:0 0 10px 0;font-size:14px;font-weight:bold;">⚙️ Solução Corporativa: Integre dados legados via API.</p><a href="https://rapidapi.com/techsuportalvorada/api/legacy-data-system-bridge" rel="nofollow" target="_blank" style="display:inline-block;background:#1a73e8;color:#ffffff;padding:8px 16px;border-radius:4px;text-decoration:none;font-size:13px;">Acesse no RapidAPI</a></div></body>|g' "$file"
              echo "Injetado em $file"
            fi
          done
      - name: Commit changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .
          git commit -m "Injeção automática de link da API" || echo "No changes"
          git push
