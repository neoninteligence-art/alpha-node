name: Inject API Link
on:
  workflow_dispatch:

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Arquiteto Fix
        run: |
          # 1. Limpa qualquer resquício de banner antigo
          # Removemos tudo entre os marcadores se eles existirem
          find public/ -name "*.html" -exec sed -i '//,//d' {} +
          
          # 2. Prepara o novo banner centralizado (em uma linha só para não dar erro)
          BANNER="<div style='width:100%;clear:both;display:block;padding:40px 0;text-align:center;'><div style='display:inline-block;background:#f8f9fa;color:#3c4043;padding:20px;border-radius:12px;border:1px solid #dadce0;font-family:sans-serif;max-width:600px;box-shadow:0 4px 10px rgba(0,0,0,0.05);'><p style='margin:0 0 12px 0;font-size:16px;font-weight:bold;'>⚙️ Solução Corporativa</p><p style='margin:0 0 15px 0;font-size:14px;color:#5f6368;'>Integre dados de sistemas legados via API profissional.</p><a href='https://rapidapi.com/techsuportalvorada/api/legacy-data-system-bridge' rel='nofollow' target='_blank' style='display:inline-block;background:#1a73e8;color:#ffffff;padding:10px 20px;border-radius:6px;text-decoration:none;font-size:14px;font-weight:bold;'>Acesse Documentação no RapidAPI</a></div></div>"

          # 3. Injeta antes do fechamento do body em todos os arquivos
          find public/ -name "*.html" -exec sed -i "s|</body>|$BANNER</body>|g" {} +

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Arquiteto'
          git config --global user.email 'action@github.com'
          git add .
          git commit -m "Ajuste final de layout" || echo "No changes"
          git push
