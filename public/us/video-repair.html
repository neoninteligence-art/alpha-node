        /* Visual Suave para a Caixa de Vídeo */

        /* Grid de Alinhamento */
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(#e1dfdd 1px, transparent 1px); background-size: 15px 15px; opacity: 0.5; pointer-events: none; }
        
        .video-icon { fill: #828282; opacity: 0.5; z-index: 2; }

        .metadata-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; font-size: 13px; }

        .btn-primary:hover { background: #005a9e; }
        
        /* Loader Azul */
        .loader-bar { width: 80%; height: 2px; background: #eee; margin-top: 20px; position: relative; overflow: hidden; z-index: 2; }
        .loader-fill { width: 30%; height: 100%; background: var(--ms-blue); position: absolute; animation: load 2s infinite linear; }
        @keyframes load { from { left: -30%; } to { left: 100%; } }
        
        .hidden { display: none; }
        footer { margin-top: 50px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: #999; text-align: center; }
